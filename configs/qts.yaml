hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false

entry:
  name: qts
  report_kind: backtest
  artifact_dir: artifacts/qts
  outputs:
    - signals
    - pnl
    - report
    - run_summary

market:
  symbols:
    - "000001"
    - "000002"
    - "600519"
    - "601318"
    - "300750"
  start_date: "20240102"
  end_date: "20240315"
  allow_synthetic_fallback: false

system:
  allocation_mode: score
  optimizer_mode: score
  execution_mode: backtest
  initial_cash: 30000.0
  lot_size: 100
  capital_caps:
    momentum: 0.65
    trend: 0.65
  optimizer_cap: 0.4
  max_adv_pct: 0.02
  slippage_base_bps: 1.0
  slippage_participation_scale: 0.035
  slippage_vol_scale: 0.15

strategies:
  - name: momentum
    strategy_kind: factor
    factor_kinds: [momentum]
    lookback: 20
    top_n: 3
  - name: trend
    strategy_kind: factor
    factor_kinds: [trend]
    lookback: 30
    top_n: 3

runtime:
  summary_only: false
  cache_root: null
