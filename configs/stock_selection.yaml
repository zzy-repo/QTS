hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false

entry:
  name: stock_selection
  report_kind: selection
  artifact_dir: artifacts/stock_selection
  outputs:
    - signals
    - report
    - run_summary

market:
  symbols:
    - "000001"
    - "600519"
    - "601318"
    - "300750"
  start_date: "20240102"
  end_date: "20240229"
  allow_synthetic_fallback: false

system:
  allocation_mode: score
  optimizer_mode: score
  execution_mode: sim
  initial_cash: 300000.0
  lot_size: 100
  capital_caps:
    selection_momentum: 0.8
  optimizer_cap: 0.4
  max_adv_pct: 0.02
  slippage_base_bps: 1.0
  slippage_participation_scale: 0.03
  slippage_vol_scale: 0.12

strategies:
  - name: selection_momentum
    strategy_kind: factor
    factor_kinds: [momentum]
    lookback: 15
    top_n: 4

runtime:
  summary_only: false
  cache_root: null
